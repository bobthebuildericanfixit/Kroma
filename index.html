<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kroma MOTD</title>
    <style>
        body {
            background-color: #050505;
            color: #00ff41; /* Classic terminal green */
            font-family: 'Courier New', Courier, monospace;
            padding: 40px;
            display: flex;
            justify-content: center;
        }

        .terminal-box {
            background-color: #111;
            border: 1px solid #333;
            padding: 20px;
            width: 600px;
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.1);
            position: relative;
        }

        /* Fake terminal window header */
        .terminal-header {
            background-color: #222;
            margin: -20px -20px 20px -20px;
            padding: 5px 10px;
            font-size: 0.8rem;
            color: #888;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
        }

        .sys-info {
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .highlight {
            color: #fff;
            font-weight: bold;
        }

        .motd-content {
            border-top: 1px dashed #444;
            padding-top: 15px;
            min-height: 50px;
        }

        /* The blinking cursor */
        .cursor {
            display: inline-block;
            width: 8px;
            height: 15px;
            background-color: #00ff41;
            animation: blink 1s step-end infinite;
            vertical-align: bottom;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="terminal-box">
        <div class="terminal-header">
            <span>root@kroma:~</span>
            <span>tty1</span>
        </div>

        <div class="sys-info">
            KROMA OS v1.0.4a (x86_64)<br>
            System Uptime: <span class="highlight">94 Days, 12 Hrs, 41 Mins</span><br>
            Active Connections: <span class="highlight">4,201</span><br>
            Security Status: <span style="color: #ff5252;">[WARNING: UNKNOWN PROXIES DETECTED]</span>
        </div>

        <div class="motd-content">
            <span id="typewriter"></span><span class="cursor"></span>
        </div>
    </div>

    <script>
        // The message you want to type out
        const text = "MOTD: Welcome to the void. Trust the system, but verify the code. No logs are kept. Proceed with caution.";
        
        let i = 0;
        const speed = 40; // Speed of typing in milliseconds

        function typeWriter() {
            if (i < text.length) {
                document.getElementById("typewriter").innerHTML += text.charAt(i);
                i++;
                setTimeout(typeWriter, speed);
            }
        }

        // Start the effect after a brief delay to simulate loading
        setTimeout(typeWriter, 800);
    </script>

</body>
</html>
